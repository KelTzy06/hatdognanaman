<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qbit - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-container {
            background: rgba(20, 25, 45, 0.8);
            border: 1px solid rgba(100, 100, 150, 0.3);
            border-radius: 15px;
            padding: 50px 40px;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
        }

        .logo-container {
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
        }

        .logo {
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .hexagon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        h1 {
            text-align: center;
            color: #ffffff;
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 10px;
            letter-spacing: -0.5px;
        }

        .subtitle {
            text-align: center;
            color: #a0a0b8;
            font-size: 14px;
            margin-bottom: 40px;
            font-weight: 400;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #ffffff;
            font-size: 13px;
            font-weight: 500;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid rgba(100, 100, 150, 0.4);
            border-radius: 8px;
            background: rgba(30, 35, 55, 0.7);
            color: #ffffff;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        input[type="text"]::placeholder,
        input[type="password"]::placeholder {
            color: #7a7a8e;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: rgba(99, 102, 241, 0.6);
            background: rgba(30, 35, 55, 0.9);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        .demo-account {
            text-align: center;
            color: #a0a0b8;
            font-size: 13px;
            margin: 25px 0;
            font-weight: 400;
        }

        .sign-in-btn {
            width: 100%;
            padding: 14px 20px;
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            color: #ffffff;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 10px;
        }

        .sign-in-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(99, 102, 241, 0.4);
        }

        .sign-in-btn:active {
            transform: translateY(0);
        }

        .arrow {
            font-size: 18px;
            transition: transform 0.3s ease;
        }

        .sign-in-btn:hover .arrow {
            transform: translateX(3px);
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo-container">
            <div class="logo">
                <div class="hexagon"></div>
            </div>
        </div>

        <h1>Welcome to Qbit</h1>
        <p class="subtitle">Your all-in-one smart calculator suite.</p>

        <form id="loginForm">
            <div class="form-group">
                <input 
                    type="text" 
                    id="username" 
                    placeholder="demo" 
                    value="demo"
                    required
                >
            </div>

            <div class="form-group">
                <input 
                    type="password" 
                    id="password" 
                    placeholder="••••••••" 
                    value="acc123"
                    required
                >
            </div>

            <p class="demo-account">Demo account provided</p>

            <button type="submit" class="sign-in-btn">
                Sign in <span class="arrow">→</span>
            </button>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            if (username === 'demo' && password === 'acc123') {
                alert('Login successful! Welcome to Qbit');
                // Redirect to main page or dashboard
                window.location.href = 'FinalProj.html';
            } else {
                alert('Invalid username or password. Use demo / acc123');
            }
        });
    </script>
</body>
</html>
